services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: careflow
      POSTGRES_USER: careflow_user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - careflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careflow_user -d careflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DEBUG: "True"
      SECRET_KEY: careflow-dev-secret-key-change-me
      DB_NAME: careflow
      DB_USER: careflow_user
      DB_PASSWORD: password
      DB_HOST: db
      DB_PORT: "5432"
      DEMO_MODE: "True"
      DEMO_USERNAME: demo_admin
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      PATIENT_DOCUMENT_STORAGE_BACKEND: local
      PATIENT_DOCUMENT_LOCAL_ROOT: /app/local_documents
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - careflow_local_documents:/app/local_documents
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_APP_URL: http://localhost:5173
      VITE_DEMO_MODE: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - careflow_frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  careflow_postgres_data:
  careflow_local_documents:
  careflow_frontend_node_modules:
